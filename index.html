<script>
// ==========================================================
// 1. 数据管理
// ==========================================================
let stockData = null; // { dates, open, high, low, close, vol }
let stockName = '兆易创新';
let chartInstance = null;
let currentTab = 'rsi';
let logScale = true;

function loadPreset(name) {
  if (STOCK_PRESETS[name]) {
    stockData = STOCK_PRESETS[name];
    stockName = name;
    return true;
  }
  return false;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].toLowerCase();
  const col = {};
  const cols = header.split(',');
  for (let i = 0; i < cols.length; i++) {
    const c = cols[i].trim();
    if (c.includes('trade_date')||c.includes('date')) col.d = i;
    if (c==='open'||c.includes('开盘')) col.o = i;
    if (c==='high'||c.includes('最高')) col.h = i;
    if (c==='low'||c.includes('最低')) col.l = i;
    if (c==='close'||c.includes('收盘')) col.c = i;
    if (c==='vol'||c.includes('成交量')||c==='volume') col.v = i;
  }
  if (col.d==null||col.o==null||col.h==null||col.l==null||col.c==null) {
    alert('CSV 缺少必要列。需要: trade_date, open, high, low, close');
    return null;
  }
  const data = { dates:[], open:[], high:[], low:[], close:[], vol:[] };
  for (let r = 1; r < lines.length; r++) {
    const p = lines[r].split(',');
    if (p.length < 5) continue;
    data.dates.push(p[col.d].trim());
    data.open.push(parseFloat(p[col.o]));
    data.high.push(parseFloat(p[col.h]));
    data.low.push(parseFloat(p[col.l]));
    data.close.push(parseFloat(p[col.c]));
    data.vol.push(col.v!=null ? parseFloat(p[col.v])||0 : 0);
  }
  // Sort ascending
  data.dates = data.dates.reverse();
  data.open.reverse(); data.high.reverse(); data.low.reverse();
  data.close.reverse(); data.vol.reverse();
  return data;
}

// ==========================================================
// 2. 指标计算
// ==========================================================
function calcRSI(d, n, ob, os) {
  const rsi = new Array(d.length).fill(null);
  if (d.length < n+1) return rsi;
  const gains = [], losses = [];
  for (let i = 1; i < d.length; i++) {
    const chg = d[i] - d[i-1];
    gains.push(chg>0?chg:0);
    losses.push(chg<0?-chg:0);
  }
  let avgG = gains.slice(0,n).reduce((a,b)=>a+b,0)/n;
  let avgL = losses.slice(0,n).reduce((a,b)=>a+b,0)/n;
  for (let i = n; i < d.length; i++) {
    const rs = avgL===0?100:avgG/avgL;
    rsi[i] = 100 - 100/(1+rs);
    if (i < d.length-1) {
      avgG = (avgG*(n-1) + gains[i])/n;
      avgL = (avgL*(n-1) + losses[i])/n;
    }
  }
  return { rsi, signals: rsi.map(v=>v==null?null:v>ob?'sell':v<os?'buy':'none') };
}

function calcMACD(d, fast, slow, sig) {
  const ema = (arr, span) => {
    const r = new Array(arr.length).fill(null);
    const k = 2/(span+1);
    r[0] = arr[0];
    for (let i = 1; i < arr.length; i++) r[i] = k*arr[i] + (1-k)*r[i-1];
    return r;
  };
  const eFast = ema(d, fast);
  const eSlow = ema(d, slow);
  const dif = eFast.map((v,i)=>v==null||eSlow[i]==null?null:v-eSlow[i]);
  const dea = ema(dif.filter(v=>v!==null), sig);
  // Pad dea with nulls
  const deaPadded = new Array(d.length).fill(null);
  let idx = 0;
  for (let i = 0; i < d.length; i++) {
    if (dif[i]!==null) { deaPadded[i] = dea[idx]; idx++; }
  }
  const hist = dif.map((v,i)=>v==null||deaPadded[i]==null?null:(v-deaPadded[i])*2);
  // Golden cross detection
  const signals = new Array(d.length).fill(null);
  for (let i = 1; i < d.length; i++) {
    if (dif[i]!==null && deaPadded[i]!==null && dif[i-1]!==null && deaPadded[i-1]!==null) {
      if (dif[i-1] < deaPadded[i-1] && dif[i] > deaPadded[i]) signals[i] = 'buy';
      else if (dif[i-1] > deaPadded[i-1] && dif[i] < deaPadded[i]) signals[i] = 'sell';
    }
  }
  return { dif, dea: deaPadded, hist, signals };
}

function calcBB(d, n, k) {
  const mid = new Array(d.length).fill(null);
  const upper = new Array(d.length).fill(null);
  const lower = new Array(d.length).fill(null);
  const pctB = new Array(d.length).fill(null);
  for (let i = n-1; i < d.length; i++) {
    const slice = d.slice(i-n+1, i+1);
    const mean = slice.reduce((a,b)=>a+b,0)/n;
    const std = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/n);
    mid[i] = mean;
    upper[i] = mean + k*std;
    lower[i] = mean - k*std;
    pctB[i] = (d[i]-lower[i])/(upper[i]-lower[i]);
  }
  const signals = pctB.map((v,i)=>v==null?null:v>1?'sell':v<0?'buy':'none');
  return { mid, upper, lower, pctB, signals };
}

function calcATR(h, l, c, n) {
  const tr = new Array(h.length).fill(null);
  for (let i = 1; i < h.length; i++) {
    const t1 = h[i]-l[i];
    const t2 = Math.abs(h[i]-c[i-1]);
    const t3 = Math.abs(l[i]-c[i-1]);
    tr[i] = Math.max(t1,t2,t3);
  }
  const atr = new Array(h.length).fill(null);
  let avg = tr.slice(1,n+1).reduce((a,b)=>a+b,0)/n;
  for (let i = n; i < h.length; i++) {
    atr[i] = avg;
    if (i < h.length-1) avg = (avg*(n-1)+tr[i+1])/n;
  }
  // Signals: atr low (bottom 20%) = buy (volatility squeeze), atr high (top 20%) = sell
  const valid = atr.filter(v=>v!==null);
  if (valid.length===0) return { atr, signals: new Array(h.length).fill(null) };
  valid.sort((a,b)=>a-b);
  const lo = valid[Math.floor(valid.length*0.2)];
  const hi = valid[Math.floor(valid.length*0.8)];
  const signals = atr.map(v=>v==null?null:v<lo?'buy':v>hi?'sell':'none');
  return { atr, signals };
}

function calcKDJ(h, l, c, n, k1, d1) {
  const rsv = new Array(h.length).fill(null);
  const kArr = new Array(h.length).fill(null);
  const dArr = new Array(h.length).fill(null);
  const jArr = new Array(h.length).fill(null);
  for (let i = n-1; i < h.length; i++) {
    const hh = Math.max(...h.slice(i-n+1,i+1));
    const ll = Math.min(...l.slice(i-n+1,i+1));
    rsv[i] = hh===ll?50:(c[i]-ll)/(hh-ll)*100;
  }
  // First K/D
  let kVal = rsv[n-1];
  let dVal = kVal;
  kArr[n-1] = kVal; dArr[n-1] = dVal; jArr[n-1] = 3*kVal-2*dVal;
  for (let i = n; i < h.length; i++) {
    kVal = (kVal*(k1-1) + rsv[i])/k1;
    dVal = (dVal*(d1-1) + kVal)/d1;
    kArr[i] = kVal; dArr[i] = dVal; jArr[i] = 3*kVal-2*dVal;
  }
  const signals = new Array(h.length).fill(null);
  for (let i = 1; i < h.length; i++) {
    if (kArr[i]==null||dArr[i]==null) continue;
    if (kArr[i-1]!==null && dArr[i-1]!==null && kArr[i-1]<dArr[i-1] && kArr[i]>dArr[i]) signals[i] = 'buy';
    else if (kArr[i-1]!==null && dArr[i-1]!==null && kArr[i-1]>dArr[i-1] && kArr[i]<dArr[i]) signals[i] = 'sell';
  }
  return { k:kArr, d:dArr, j:jArr, rsv, signals };
}

// ==========================================================
// 3. 参数管理
// ==========================================================
function getParams() {
  const g = (sel) => document.querySelector(sel);
  const gv = (sel) => parseFloat(g(sel).value);
  return {
    rsi: { n: gv('#sidebar [data-p=rsiN]'), ob: gv('#sidebar [data-p=rsiOb]'), os: gv('#sidebar [data-p=rsiOs]') },
    macd: { fast: gv('#sidebar [data-p=macdFast]'), slow: gv('#sidebar [data-p=macdSlow]'), sig: gv('#sidebar [data-p=macdSig]') },
    bb: { n: gv('#sidebar [data-p=bbN]'), k: gv('#sidebar [data-p=bbK]') },
    atr: { n: gv('#sidebar [data-p=atrN]') },
    kdj: { rsv: gv('#sidebar [data-p=kdjRsv]'), k: gv('#sidebar [data-p=kdjK]'), d: gv('#sidebar [data-p=kdjD]') }
  };
}

// ==========================================================
// 4. 图表渲染
// ==========================================================
let chartColors = {
  price: '#2563eb', rsi: '#7c3aed', macdDif: '#7c3aed', macdDea: '#f59e0b',
  bbMid: '#7c3aed', bbBand: '#9ca3af', atr: '#0284c7',
  kdjK: '#7c3aed', kdjD: '#f59e0b', kdjJ: '#10b981',
  buy: '#10b981', sell: '#dc2626'
};

function formatDate(d) {
  if (!d) return '';
  const s = String(d);
  return s.slice(4,6)+'/'+s.slice(6,8);
}

function showError(msg) {
  const el = document.getElementById('chartLegend');
  el.textContent = msg;
  el.style.color = '#dc2626';
}

function renderChart() {
  if (!stockData) { showError('请先加载股票数据'); return; }
  const p = getParams();
  const d = stockData;
  const labels = d.dates.map(formatDate);
  const N = d.close.length;

  // Compute indicators
  const rsi = calcRSI(d.close, p.rsi.n, p.rsi.ob, p.rsi.os);
  const macd = calcMACD(d.close, p.macd.fast, p.macd.slow, p.macd.sig);
  const bb = calcBB(d.close, p.bb.n, p.bb.k);
  const atr = calcATR(d.high, d.low, d.close, p.atr.n);
  const kdj = calcKDJ(d.high, d.low, d.close, p.kdj.rsv, p.kdj.k, p.kdj.d);

  // Stats
  const last = d.close[N-1]||0;
  const s = (arr) => arr[N-1];
  document.getElementById('sClose').textContent = last.toFixed(2);
  document.getElementById('sRsi').textContent = s(rsi.rsi)!==null?s(rsi.rsi).toFixed(1):'—';
  document.getElementById('sMacd').textContent = s(macd.dif)!==null?s(macd.dif).toFixed(2):'—';
  document.getElementById('sBb').textContent = s(bb.pctB)!==null?s(bb.pctB).toFixed(2):'—';
  document.getElementById('sAtr').textContent = s(atr.atr)!==null?s(atr.atr).toFixed(2):'—';

  // Signals
  let buy=[], sell=[];
  const sig = (arr, b, s) => { const v = arr[N-1]; if(v==='buy') buy.push(b); if(v==='sell') sell.push(s); };
  sig(rsi.signals, 'RSI超卖', 'RSI超买');
  sig(macd.signals, 'MACD金叉', 'MACD死叉');
  sig(bb.signals, '布林触碰下轨', '布林触碰上轨');
  sig(kdj.signals, 'KDJ金叉', 'KDJ死叉');
  document.getElementById('buySignals').textContent = buy.join(', ')||'无';
  document.getElementById('sellSignals').textContent = sell.join(', ')||'无';

  // Build datasets
  const ds = [];

  // Price - always on left axis
  ds.push({ label: '收盘价', data: d.close, borderColor: '#2563eb', borderWidth: 1.8, pointRadius: 0, yAxisID: 'y', order: 10 });

  // Tab-specific datasets
  if (currentTab === 'rsi') {
    ds.push({ label: 'RSI', data: rsi.rsi, borderColor: '#7c3aed', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', order: 9 });
    ds.push({ label: '', data: labels.map(()=>p.rsi.ob), borderColor: 'rgba(220,38,38,0.4)', borderWidth: 0.8, borderDash: [5,3], pointRadius: 0, yAxisID: 'y2', order: 1 });
    ds.push({ label: '', data: labels.map(()=>p.rsi.os), borderColor: 'rgba(16,185,129,0.4)', borderWidth: 0.8, borderDash: [5,3], pointRadius: 0, yAxisID: 'y2', order: 1 });
    ds.push({ label: '', data: labels.map(()=>50), borderColor: 'rgba(0,0,0,0.08)', borderWidth: 0.5, borderDash: [2,2], pointRadius: 0, yAxisID: 'y2', order: 1 });
  }
  if (currentTab === 'macd') {
    ds.push({ label: 'DIF', data: macd.dif, borderColor: '#7c3aed', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', order: 9 });
    ds.push({ label: 'DEA', data: macd.dea, borderColor: '#f59e0b', borderWidth: 1.3, borderDash: [4,3], pointRadius: 0, yAxisID: 'y2', order: 8 });
    ds.push({ label: '柱', data: macd.hist, borderColor: 'transparent', backgroundColor: macd.hist.map(v=>v===null?'transparent':v>=0?'rgba(220,38,38,0.6)':'rgba(16,185,129,0.6)'), borderWidth: 0, pointRadius: 0, yAxisID: 'y2', order: 7 });
    ds.push({ label: '', data: labels.map(()=>0), borderColor: 'rgba(0,0,0,0.12)', borderWidth: 0.5, pointRadius: 0, yAxisID: 'y2', order: 1 });
  }
  if (currentTab === 'bb') {
    ds.push({ label: '中轨', data: bb.mid, borderColor: '#7c3aed', borderWidth: 1.2, pointRadius: 0, yAxisID: 'y', order: 9 });
    ds.push({ label: '上轨', data: bb.upper, borderColor: '#9ca3af', borderWidth: 0.8, borderDash: [3,3], pointRadius: 0, yAxisID: 'y', order: 8 });
    ds.push({ label: '下轨', data: bb.lower, borderColor: '#9ca3af', borderWidth: 0.8, borderDash: [3,3], pointRadius: 0, yAxisID: 'y', order: 8 });
  }
  if (currentTab === 'atr') {
    ds.push({ label: 'ATR', data: atr.atr, borderColor: '#0284c7', borderWidth: 1.8, pointRadius: 0, yAxisID: 'y2', order: 9 });
  }
  if (currentTab === 'kdj') {
    ds.push({ label: 'K', data: kdj.k, borderColor: '#7c3aed', borderWidth: 1.5, pointRadius: 0, yAxisID: 'y2', order: 9 });
    ds.push({ label: 'D', data: kdj.d, borderColor: '#f59e0b', borderWidth: 1.3, borderDash: [4,3], pointRadius: 0, yAxisID: 'y2', order: 8 });
    ds.push({ label: 'J', data: kdj.j, borderColor: '#10b981', borderWidth: 1.2, borderDash: [2,2], pointRadius: 0, yAxisID: 'y2', order: 7 });
    ds.push({ label: '', data: labels.map(()=>80), borderColor: 'rgba(220,38,38,0.3)', borderWidth: 0.6, borderDash: [4,3], pointRadius: 0, yAxisID: 'y2', order: 1 });
    ds.push({ label: '', data: labels.map(()=>20), borderColor: 'rgba(16,185,129,0.3)', borderWidth: 0.6, borderDash: [4,3], pointRadius: 0, yAxisID: 'y2', order: 1 });
  }

  // Y axes
  const hasY2 = ['rsi','macd','atr','kdj'].includes(currentTab);
  const y2Label = { rsi:'RSI',macd:'MACD',atr:'ATR',kdj:'KDJ' }[currentTab]||'';
  const sc = {
    x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } },
    y: {
      type: logScale ? 'logarithmic' : 'linear',
      position: 'left',
      title: { display: true, text: '价格', font: { size: 10 } },
      ticks: { font: { size: 9 } },
      grid: { color: 'rgba(0,0,0,0.06)' }
    }
  };
  if (hasY2) {
    sc.y2 = {
      position: 'right',
      title: { display: true, text: y2Label, font: { size: 10 } },
      ticks: { font: { size: 9 } },
      grid: { display: false }
    };
    if (currentTab === 'rsi') { sc.y2.min = 0; sc.y2.max = 100; }
    if (currentTab === 'kdj') { sc.y2.min = -20; sc.y2.max = 120; }
  }

  // Destroy old chart
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  try {
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: ds },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                const v = ctx.parsed.y;
                if (v === null || v === undefined) return '';
                const label = ctx.dataset.label || '';
                return label ? label + ': ' + v.toFixed(2) : '';
              }
            }
          }
        },
        scales: sc
      }
    });
  } catch(e) {
    showError('Chart error: ' + e.message);
    return;
  }

  // Update title
  const titles = { rsi:'RSI — 相对强弱指标', macd:'MACD — 指数平滑异同移动平均线', bb:'布林带 — Bollinger Bands', atr:'ATR — 平均真实波幅', kdj:'KDJ — 随机指标' };
  const legends = { rsi:'价格走势（左轴）· RSI（右轴）· 超买/超卖线', macd:'价格走势（左轴）· DIF/DEA/柱状图（右轴）', bb:'价格走势 · 中轨（紫）· 上下轨（灰虚线）', atr:'价格走势（左轴）· ATR（右轴）', kdj:'价格走势（左轴）· K/D/J（右轴）' };
  document.getElementById('chartTitle').textContent = titles[currentTab]||'';
  let sub = '';
  if (currentTab==='rsi') sub = 'N='+p.rsi.n+' 超买='+p.rsi.ob+' 超卖='+p.rsi.os;
  else if (currentTab==='macd') sub = p.macd.fast+'/'+p.macd.slow+'/'+p.macd.sig;
  else if (currentTab==='bb') sub = 'N='+p.bb.n+' '+p.bb.k+'σ';
  else if (currentTab==='atr') sub = 'N='+p.atr.n;
  else if (currentTab==='kdj') sub = p.kdj.rsv+'/'+p.kdj.k+'/'+p.kdj.d;
  document.getElementById('chartSub').textContent = sub;
  const leg = document.getElementById('chartLegend');
  leg.textContent = legends[currentTab]||'';
  leg.style.color = '#9ca3af';
}
// ==========================================================
// 5. UI 交互
// ==========================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.ind===tab));
  renderChart();
}

function toggleVis(name) {
  const el = document.querySelector(`[data-vis=${name}]`);
  el.classList.toggle('on');
  renderChart();
}

// Init
function init() {
  if (!loadPreset('兆易创新')) return;
  renderChart();
}

// Event listeners
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) switchTab(tab.dataset.tab);
});

document.getElementById('sidebar').addEventListener('click', e => {
  const panel = e.target.closest('.panel');
  if (panel && !e.target.closest('.tg') && !e.target.closest('input')) {
    switchTab(panel.dataset.ind);
  }
  const tg = e.target.closest('.tg');
  if (tg) toggleVis(tg.dataset.vis);
});

document.getElementById('recalcBtn').addEventListener('click', renderChart);
// Auto-recalc on parameter change
document.querySelectorAll('#sidebar input').forEach(el => {
  el.addEventListener('input', () => {
    // Update slider display
    if (el.type === 'range') {
      const v = parseFloat(el.value);
      el.nextElementSibling.textContent = Number.isInteger(v) ? v : v.toFixed(1);
    }
    renderChart();
  });
  el.addEventListener('change', renderChart);
});

// Range sliders update value display
document.querySelectorAll('input[type=range]').forEach(el => {
  el.addEventListener('input', () => {
    el.nextElementSibling.textContent = parseFloat(el.value) + (el.step==='0.5'&&Number.isInteger(parseFloat(el.value)*2)?'':'.0');
    // Format display
    const v = parseFloat(el.value);
    el.nextElementSibling.textContent = Number.isInteger(v)?v:v.toFixed(1);
  });
});

document.getElementById('scaleToggle').addEventListener('click', e => {
  logScale = !logScale;
  e.target.textContent = logScale ? '对数坐标' : '线性坐标';
  renderChart();
});

// Stock code input toggle
document.getElementById('stockSelect').addEventListener('change', e => {
  const input = document.getElementById('stockCodeInput');
  input.style.display = e.target.value === '__custom__' ? 'inline-block' : 'none';
  if (e.target.value === '__custom__') input.focus();
});

async function fetchStock(code) {
  const loading = document.getElementById('loading');
  loading.classList.remove('hidden');
  try {
    const resp = await fetch(`/api/stock?code=${code}`);
    const data = await resp.json();
    if (data.error) { alert('获取数据失败: ' + data.error); return false; }
    if (!data.dates || data.dates.length < 30) { alert('数据不足（少于30个交易日）'); return false; }
    stockData = {
      dates: data.dates, open: data.open, high: data.high,
      low: data.low, close: data.close, vol: data.vol
    };
    stockName = (data.name || code) + ' (' + code + ')';
    renderChart();
    return true;
  } catch(e) {
    alert('网络请求失败: ' + e.message);
    return false;
  } finally {
    loading.classList.add('hidden');
  }
}

document.getElementById('loadBtn').addEventListener('click', () => {
  const sel = document.getElementById('stockSelect');
  const val = sel.value;
  if (val === '__upload__') {
    document.getElementById('csvInput').click();
    return;
  }
  if (val === '__custom__') {
    const code = document.getElementById('stockCodeInput').value.trim();
    if (!code || code.length !== 6) { alert('请输入6位股票代码'); return; }
    fetchStock(code);
    return;
  }
  // Try preset first, then fetch
  if (STOCK_PRESETS[val]) {
    loadPreset(val);
    renderChart();
  } else {
    fetchStock(val);
  }
});

document.getElementById('csvBtn').addEventListener('click', () => {
  document.getElementById('stockSelect').value = '__upload__';
  document.getElementById('csvInput').click();
});

document.getElementById('csvInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const data = parseCSV(evt.target.result);
    if (data) {
      stockData = data;
      stockName = file.name;
      renderChart();
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('resetBtn').addEventListener('click', () => {
  // Reset params to defaults
  document.querySelector('[data-p=rsiN]').value = 14;
  document.querySelector('[data-p=rsiOb]').value = 70;
  document.querySelector('[data-p=rsiOs]').value = 30;
  document.querySelector('[data-p=macdFast]').value = 12;
  document.querySelector('[data-p=macdSlow]').value = 26;
  document.querySelector('[data-p=macdSig]').value = 9;
  document.querySelector('[data-p=bbN]').value = 20;
  document.querySelector('[data-p=bbK]').value = 2;
  document.querySelector('[data-p=atrN]').value = 14;
  document.querySelector('[data-p=kdjRsv]').value = 9;
  document.querySelector('[data-p=kdjK]').value = 3;
  document.querySelector('[data-p=kdjD]').value = 3;
  // Update slider displays
  document.querySelectorAll('input[type=range]').forEach(el => {
    el.nextElementSibling.textContent = el.value;
  });
  document.getElementById('stockSelect').value = '603986';
  document.getElementById('stockCodeInput').style.display = 'none';
  if (!logScale) { logScale = true; document.getElementById('scaleToggle').textContent = '对数坐标'; }
  // Reload default stock
  if (STOCK_PRESETS['603986']) {
    loadPreset('603986');
    renderChart();
  } else {
    fetchStock('603986');
  }
});

// Start
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Chart === 'undefined') {
    document.getElementById('chartTitle').textContent = 'Chart.js 加载失败';
    document.getElementById('chartSub').textContent = '请检查网络连接或刷新页面';
    return;
  }
  init();
});
</script>
