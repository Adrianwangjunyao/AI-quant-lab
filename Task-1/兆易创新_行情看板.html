  {date:'20250707',open:118.98,high:120.81,low:117.86,close:120.81,vol:114584.95,amount:1370153.527,pct:1.6491},
  {date:'20250704',open:119.19,high:120.3,low:117.51,close:118.85,vol:141826.95,amount:1683622.173,pct:-0.7267},
  {date:'20250703',open:120.58,high:121.55,low:119.0,close:119.72,vol:128590.07,amount:1541698.795,pct:-0.7626},
  {date:'20250702',open:123.28,high:123.3,low:120.1,close:120.98,vol:130681.06,amount:1586895.318,pct:-2.4512}
];

// Sort by date ascending
rawData.sort((a,b) => a.date.localeCompare(b.date));

// ====== 统计数据 ======
const firstClose = rawData[0].close;
const lastClose = rawData[rawData.length-1].close;
const totalChange = lastClose - firstClose;
const totalPct = (totalChange / firstClose * 100);
const maxClose = Math.max(...rawData.map(d => d.close));
const minClose = Math.min(...rawData.map(d => d.close));
const maxVol = Math.max(...rawData.map(d => d.vol));
const totalVol = rawData.reduce((s,d) => s + d.vol, 0);
const avgClose = rawData.reduce((s,d) => s + d.close, 0) / rawData.length;
const upDays = rawData.filter(d => d.pct > 0).length;
const downDays = rawData.filter(d => d.pct < 0).length;

// ====== 渲染统计卡片 ======
const statsGrid = document.getElementById('statsGrid');
const stats = [
  { label: '最新收盘价', value: lastClose.toFixed(2), unit: '元', cls: totalChange>=0?'up':'down', change: `${totalChange>=0?'+':''}${totalChange.toFixed(2)} (${totalPct>=0?'+':''}${totalPct.toFixed(2)}%)` },
  { label: '期间最高价', value: maxClose.toFixed(2), unit: '元', cls: 'up', change: '' },
  { label: '期间最低价', value: minClose.toFixed(2), unit: '元', cls: 'down', change: '' },
  { label: '均价', value: avgClose.toFixed(2), unit: '元', cls: '', change: '' },
  { label: '日均成交量', value: (totalVol / rawData.length / 10000).toFixed(1), unit: '万手', cls: '', change: '' },
  { label: '涨跌天数', value: `${upDays}涨 / ${downDays}跌`, unit: '', cls: upDays > downDays ? 'up' : 'down', change: `胜率 ${(upDays/(upDays+downDays)*100).toFixed(1)}%` }
];
statsGrid.innerHTML = stats.map(s => `
  <div class="stat-card">
    <div class="label">${s.label}</div>
    <div class="value ${s.cls}">${s.value} <span style="font-size:14px;font-weight:400">${s.unit}</span></div>
    ${s.change ? `<div class="change ${s.cls}">${s.change}</div>` : ''}
  </div>
`).join('');

// ====== 格式化日期 ======
function fmtDate(d) {
  const y = d.slice(0,4), m = d.slice(4,6), day = d.slice(6,8);
  return `${y}/${m}/${day}`;
}
function fmtShortDate(d) {
  const m = parseInt(d.slice(4,6)), day = parseInt(d.slice(6,8));
  return `${m}/${day}`;
}

// ====== 构建 ECharts 图表 ======
const chartDom = document.getElementById('mainChart');
const myChart = echarts.init(chartDom);

const dates = rawData.map(d => fmtShortDate(d.date));
const closeData = rawData.map(d => d.close);
const volData = rawData.map(d => d.vol / 10000); // 转化为万手
const volColor = rawData.map(d => d.pct >= 0 ? '#ef5350' : '#26a69a');

const option = {
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' },
    backgroundColor: 'rgba(255,255,255,0.95)',
    borderColor: '#e5e7eb',
    borderWidth: 1,
    textStyle: { color: '#1a1a2e', fontSize: 13 },
    formatter: function(params) {
      const idx = params[0].dataIndex;
      const d = rawData[idx];
      const cls = d.pct >= 0 ? 'up' : 'down';
      return `
        <div style="font-weight:600;margin-bottom:6px;font-size:14px">${fmtDate(d.date)}</div>
        <div>开盘：${d.open.toFixed(2)}</div>
        <div>最高：${d.high.toFixed(2)}</div>
        <div>最低：${d.low.toFixed(2)}</div>
        <div style="font-weight:600">收盘：<span class="${cls}">${d.close.toFixed(2)}</span></div>
        <div>涨跌幅：<span class="${cls}">${d.pct >= 0 ? '+' : ''}${d.pct.toFixed(2)}%</span></div>
        <div>成交量：${(d.vol/10000).toFixed(1)} 万手</div>
        <div>成交额：${(d.amount/10000).toFixed(1)} 万元</div>
      `;
    }
  },
  grid: [
    { left: '4%', right: '4%', top: '6%', height: '60%' },
    { left: '4%', right: '4%', top: '74%', height: '18%' }
  ],
  xAxis: [
    {
      type: 'category',
      data: dates,
      gridIndex: 0,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: {
        fontSize: 11,
        color: '#9ca3af',
        interval: 15
      },
      splitLine: { show: false }
    },
    {
      type: 'category',
      data: dates,
      gridIndex: 1,
      axisLine: { show: false },
      axisTick: { show: false },
      axisLabel: { show: false },
      splitLine: { show: false }
    }
  ],
  yAxis: [
    {
      type: 'value',
      gridIndex: 0,
      splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } },
      axisLabel: {
        fontSize: 11,
        color: '#9ca3af',
        formatter: '{value}'
      },
      name: '收盘价 (元)',
      nameTextStyle: { fontSize: 11, color: '#9ca3af' }
    },
    {
      type: 'value',
      gridIndex: 1,
      splitLine: { show: false },
      axisLabel: {
        fontSize: 11,
        color: '#9ca3af',
        formatter: '{value}'
      },
      name: '万手',
      nameTextStyle: { fontSize: 11, color: '#9ca3af' }
    }
  ],
  dataZoom: [
    {
      type: 'inside',
      xAxisIndex: [0, 1],
      start: 0,
      end: 100,
      zoomOnMouseWheel: true,
      moveOnMouseMove: true
    },
    {
      type: 'slider',
      xAxisIndex: [0, 1],
      start: 70,
      end: 100,
      height: 16,
      bottom: 2,
      borderColor: '#e5e7eb',
      fillerColor: 'rgba(66, 165, 245, 0.2)',
      handleStyle: { color: '#42a5f5' },
      textStyle: { fontSize: 10 }
    }
  ],
  series: [
    {
      name: '收盘价',
      type: 'line',
      data: closeData,
      xAxisIndex: 0,
      yAxisIndex: 0,
      smooth: true,
      symbol: 'none',
      lineStyle: {
        color: '#ef5350',
        width: 2
      },
      areaStyle: {
        color: {
          type: 'linear',
          x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [
            { offset: 0, color: 'rgba(239,83,80,0.3)' },
            { offset: 1, color: 'rgba(239,83,80,0.02)' }
          ]
        }
      },
      markLine: {
        silent: true,
        data: [
          {
            yAxis: lastClose,
            label: {
              formatter: `最新 ${lastClose.toFixed(2)}`,
              position: 'insideEndTop',
              fontSize: 11,
              color: '#ef5350'
            },
            lineStyle: { color: '#ef5350', type: 'dashed', opacity: 0.5 }
          }
        ]
      }
    },
    {
      name: '成交量',
      type: 'bar',
      data: volData,
      xAxisIndex: 1,
      yAxisIndex: 1,
      itemStyle: { color: function(p) { return volColor[p.dataIndex]; }, opacity: 0.6 },
      barWidth: '60%'
    }
  ]
};

myChart.setOption(option);

// 响应式
window.addEventListener('resize', () => myChart.resize());

// ====== 渲染数据表格 ======
const tbody = document.querySelector('#dataTable tbody');
// 倒序（最新在上面）
const sorted = [...rawData].reverse();
tbody.innerHTML = sorted.map(d => {
  const cls = d.pct >= 0 ? 'up' : 'down';
  return `<tr class="${cls}">
    <td>${fmtDate(d.date)}</td>
    <td>${d.open.toFixed(2)}</td>
    <td>${d.high.toFixed(2)}</td>
    <td>${d.low.toFixed(2)}</td>
    <td><strong>${d.close.toFixed(2)}</strong></td>
    <td>${d.pct >= 0 ? '+' : ''}${d.pct.toFixed(2)}</td>
    <td>${(d.vol/10000).toFixed(1)}</td>
    <td>${(d.amount/10000).toFixed(1)}</td>
  </tr>`;
}).join('');
</script>
</body>
</html>
